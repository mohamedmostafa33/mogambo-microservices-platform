# Values for front-end Helm Chart.

# Namespace Configuration
namespace: mogambo
fullnameOverride: front-end

# The count of replicas to deploy. This is ignored if autoscaling is enabled.
replicaCount: 1

# This sets the container port for the deployment.
containerPort: 8079

# This sets the container image. 
image:
  # This sets the image repository.
  repository: 231498620802.dkr.ecr.us-east-1.amazonaws.com/mogambo-frontend
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Image tag.
  tag: 19b39a8

# This is for setting up the config map reference for the deployment.
ConfigMap: 
  name: front-end-config
  data:
    CARTS_BASE_URL: http://carts:8080
    CATALOGUE_IMAGES_BASE_URL: https://d3d1mcn975jivq.cloudfront.net

# This is for setting up a service.
service:
  # This sets the service type.
  type: ClusterIP
  # This sets the ports.
  port: 80

# This block is for setting up the ingress.
ingress:
  enabled: true
  name: front-end-ingress
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/scheme: internet-facing
  rules:
    - http:
        paths:
          - path: /catalogue
            pathType: Prefix
            backend:
              service:
                name: catalogue
                port:
                  number: 80
          - path: /carts
            pathType: Prefix
            backend:
              service:
                name: carts
                port:
                    number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-end
                port:
                  number: 80

# This block is for setting up the IngressClass.
# Set create: false if the IngressClass already exists in your cluster.
# This is typically created once by an admin, not per-application.
ingressClass:
  create: false
  name: alb
  controller: ingress.k8s.aws/alb

# This is for setting up the resources for a container.
resources:
  requests:
    memory: "256Mi"      
    cpu: "100m"        
  limits:
    memory: "512Mi"      
    cpu: "300m"

# This is to setup the liveness and readiness probes.
livenessProbe:
  httpGet:
    path: /healthz
    port: 8079
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /healthz
    port: 8079
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3