apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
  namespace: mogambo
  labels:
    app: carts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carts
  template:
    metadata:
      labels:
        app: carts
    spec:
      containers:
        - name: carts
          image: <AWS_ECR_REGISTRY_URL>/mogambo-carts:<COMMIT_SHA>
          ports:
            - containerPort: 80
          env:
            - name: db
              value: "carts-db"
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6