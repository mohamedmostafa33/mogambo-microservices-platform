apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: carts-db
  namespace: mogambo
  labels:
    app: carts-db
spec:
  serviceName: "carts-db"
  replicas: 1
  selector:
    matchLabels:
      app: carts-db
  template:
    metadata:
      labels:
        app: carts-db
    spec:
      containers:
        - name: carts-db
          image: mongo:4.4
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "600m"
              memory: "1Gi"
          startupProbe:
            tcpSocket:
              port: 27017
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: carts-db-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: carts-db-data
      spec:
        storageClassName: gp2
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi