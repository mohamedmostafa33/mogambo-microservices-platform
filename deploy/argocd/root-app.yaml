apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mogambo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mohamedmostafa33/mogambo-microservices-platform.git'
    targetRevision: dev
    path: deploy/argocd/apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true