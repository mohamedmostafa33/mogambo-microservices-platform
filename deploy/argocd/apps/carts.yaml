apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: carts
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mohamedmostafa33/mogambo-microservices-platform.git'
    targetRevision: dev
    path: deploy/helm/charts/carts
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: mogambo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true