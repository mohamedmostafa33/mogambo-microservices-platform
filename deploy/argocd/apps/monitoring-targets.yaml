apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-targets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://github.com/mohamedmostafa33/mogambo-microservices-platform.git'
    targetRevision: dev
    path: deploy/k8s/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: mogambo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
