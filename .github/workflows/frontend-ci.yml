name: Front-end CI Pipeline

run-name: Front-end CI - ${{ github.event_name }}

on:
  push:
    branches:
      - 'dev'

  pull_request:
    branches:
      - 'dev'
      - 'main'

permissions:
  contents: read

env:
  aws-region: us-east-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.detect.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changes in frontend
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/front-end/**'

      - name: Show change detection result
        run: |
          echo "Changes detected: ${{ steps.detect.outputs.frontend }}"

  build-and-test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/front-end/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/front-end
        run: |
          npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: src/front-end
        run: npm test

      - name: Build frontend
        working-directory: src/front-end
        run: |
          npm run build

  docker:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: |
      needs.build-and-test.result == 'success'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Commit SHA
        id: get-sha
        run: echo "COMMIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/front-end:${{ env.COMMIT_SHA }} src/front-end

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/front-end:${{ env.COMMIT_SHA }}


