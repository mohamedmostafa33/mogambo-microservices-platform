name: Front-end CI Pipeline

run-name: Front-end CI - ${{ github.event_name }}

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild Docker image without cache'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - 'dev'

  pull_request:
    branches:
      - 'dev'
      - 'main'

permissions:
  contents: write
  id-token: write

env:
  aws-region: us-east-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.detect.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changes in frontend
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/front-end/**'

      - name: Show change detection result
        run: |
          echo "Changes detected: ${{ steps.detect.outputs.frontend }}"

  build-and-test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.frontend == 'true' || 
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/front-end/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/front-end
        run: |
          npm ci --legacy-peer-deps

      - name: OWASP Dependency Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'front-end'
          path: 'src/front-end'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --disableYarnAudit

      - name: Run tests
        working-directory: src/front-end
        run: npm test

      - name: Build frontend
        working-directory: src/front-end
        run: |
          npm run build

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: 'src/front-end'
          args: >
            -Dsonar.projectKey=front-end
            -Dsonar.projectName=Front-end
            -Dsonar.sources=api,helpers,server.js,config.js,public/js
            -Dsonar.tests=test
            -Dsonar.exclusions=**/node_modules/**,**/*.min.js,**/public/js/jquery*.js,**/public/js/bootstrap*.js,**/public/js/owl*.js,**/public/js/modernizr.js,**/public/css/**,**/public/img/**,**/public/fonts/**
            -Dsonar.test.inclusions=test/**/*.js
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: src/front-end/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker:
    needs: [detect-changes, build-and-test]
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.get-sha.outputs.commit_sha }}
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.frontend == 'true' && needs.build-and-test.result == 'success')
      || (github.event_name =='workflow_dispatch' && needs.build-and-test.result == 'success')
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Commit SHA
        id: get-sha
        run: echo "commit_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "Running forced Docker rebuild without cache"
            docker build --no-cache -t mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }} src/front-end
          else
            docker build -t mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }} src/front-end
          fi

      - name: Tag Docker image for ECR
        run: |
          docker tag mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }} ${{ secrets.AWS_ECR_REGISTRY_URL }}/mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }}

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.aws-region }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.aws-region }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY_URL }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.AWS_ECR_REGISTRY_URL }}/mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }}
          
  update-helm-values:
    needs: [detect-changes, build-and-test, docker]
    runs-on: ubuntu-latest
    if: ${{ needs.docker.result == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
      
      - name: Update Helm values image tag
        run: |
          IMAGE_TAG="${{ needs.docker.outputs.commit_sha }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "Docker image tag output is empty."
            exit 1
          fi

          sed -i -E "s|^([[:space:]]*tag:).*|\1 ${IMAGE_TAG}|" deploy/helm/charts/front-end/values.yaml
          git add deploy/helm/charts/front-end/values.yaml

          if git diff --cached --quiet; then
            echo "Helm values already up to date."
            exit 0
          fi

          git commit -m "chore(ci): update front-end helm image tag to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:dev
