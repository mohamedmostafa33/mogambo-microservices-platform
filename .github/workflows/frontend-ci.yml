name: Front-end CI Pipeline

run-name: Front-end CI - ${{ github.event_name }}

on:
  push:
    branches:
      - 'dev'

  pull_request:
    branches:
      - 'dev'
      - 'main'

permissions:
  contents: read
  id-token: write

env:
  aws-region: us-east-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.detect.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changes in frontend
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/front-end/**'

      - name: Show change detection result
        run: |
          echo "Changes detected: ${{ steps.detect.outputs.frontend }}"

  build-and-test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/front-end/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/front-end
        run: |
          npm ci --legacy-peer-deps

      - name: OWASP Dependency Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'front-end'
          path: 'src/front-end'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --disableYarnAudit

      - name: Run tests
        working-directory: src/front-end
        run: npm test

      - name: Build frontend
        working-directory: src/front-end
        run: |
          npm run build

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: 'src/front-end'
          extraProperties: |
            sonar.projectKey=front-end
            sonar.projectName=Front-end
            sonar.sources=api,helpers,server.js,config.js,public/js
            sonar.tests=test
            sonar.exclusions=**/node_modules/**,**/*.min.js,**/public/js/jquery*.js,**/public/js/bootstrap*.js,**/public/js/owl*.js,**/public/js/modernizr.js,**/public/css/**,**/public/img/**,**/public/fonts/**
            sonar.test.inclusions=test/**/*.js
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: src/front-end/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: |
      needs.build-and-test.result == 'success'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Commit SHA
        id: get-sha
        run: echo "commit_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t mogambo-frontend src/front-end

      - name: Tag Docker image for ECR
        run: |
          docker tag mogambo-frontend:latest ${{ secrets.AWS_ECR_REGISTRY_URL }}/mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.aws-region }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.aws-region }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY_URL }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.AWS_ECR_REGISTRY_URL }}/mogambo-frontend:${{ steps.get-sha.outputs.commit_sha }}
