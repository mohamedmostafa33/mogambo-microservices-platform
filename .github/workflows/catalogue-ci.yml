name: Catalogue CI Pipeline

run-name: Catalogue CI - ${{ github.event_name }}

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild Docker image without cache'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - 'dev'

  pull_request:
    branches:
      - 'dev'
      - 'main'

permissions:
  contents: write
  id-token: write

env:
  aws-region: us-east-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      catalogue: ${{ steps.detect.outputs.catalogue }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Detect changes in catalogue
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            catalogue:
              - 'src/catalogue/**'
        
      - name: Show change detection result
        run: |
          echo "Changes detected: ${{ steps.detect.outputs.catalogue }}"

  build-and-test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.catalogue == 'true' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    env:
      GO_VERSION: '1.16'
      GO111MODULE: 'off'
      CGO_ENABLED: '0'
      GOPATH: ${{ github.workspace }}/.gopath
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prepare GOPATH layout
        run: |
          mkdir -p "$GOPATH/src/github.com/microservices-demo"
          ln -s "$GITHUB_WORKSPACE/src/catalogue" "$GOPATH/src/github.com/microservices-demo/catalogue"

      - name: Cache Go build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GOPATH }}/pkg
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-catalogue-${{ hashFiles('src/catalogue/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-catalogue-

      - name: Download dependencies
        working-directory: ${{ env.GOPATH }}/src/github.com/microservices-demo/catalogue
        run: go get ./...

      - name: OWASP Dependency Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'catalogue'
          path: 'src/catalogue'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --disableYarnAudit

      - name: Run tests
        working-directory: ${{ env.GOPATH }}/src/github.com/microservices-demo/catalogue
        run: go test -v ./...

      - name: Run go vet
        working-directory: ${{ env.GOPATH }}/src/github.com/microservices-demo/catalogue
        run: go vet ./...

      - name: Build catalogue
        working-directory: ${{ env.GOPATH }}/src/github.com/microservices-demo/catalogue
        run: go build -trimpath -ldflags="-s -w" -o catalogue ./cmd/cataloguesvc

      - name: Generate coverage report
        working-directory: ${{ env.GOPATH }}/src/github.com/microservices-demo/catalogue
        run: go test ./... -coverprofile=coverage.out

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ env.GOPATH }}/src/github.com/microservices-demo/catalogue
          args: >
            -Dsonar.projectKey=catalogue
            -Dsonar.projectName=Catalogue
            -Dsonar.sources=.
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.go.coverage.reportPaths=coverage.out
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ${{ env.GOPATH }}/src/github.com/microservices-demo/catalogue/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  
  docker:
    needs: [detect-changes, build-and-test]
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.get-sha.outputs.commit_sha }}
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.catalogue == 'true' && needs.build-and-test.result == 'success') ||
      (github.event_name == 'workflow_dispatch' && needs.build-and-test.result == 'success')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Commit SHA
        id: get-sha
        run: echo "commit_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "Running forced Docker rebuild without cache"
            docker build --no-cache -t mogambo-catalogue:${{ steps.get-sha.outputs.commit_sha }} src/catalogue
          else
            docker build -t mogambo-catalogue:${{ steps.get-sha.outputs.commit_sha }} src/catalogue
          fi

      - name: Tag Docker image for ECR
        run: |
          docker tag mogambo-catalogue:${{ steps.get-sha.outputs.commit_sha }} ${{ secrets.AWS_ECR_REGISTRY_URL }}/mogambo-catalogue:${{ steps.get-sha.outputs.commit_sha }}

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: mogambo-catalogue:${{ steps.get-sha.outputs.commit_sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.aws-region }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.aws-region }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY_URL }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.AWS_ECR_REGISTRY_URL }}/mogambo-catalogue:${{ steps.get-sha.outputs.commit_sha }}

  update-helm-values:
    needs: [detect-changes, build-and-test, docker]
    runs-on: ubuntu-latest
    if: ${{ needs.docker.result == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
      
      - name: Update Helm values image tag
        run: |
          IMAGE_TAG="${{ needs.docker.outputs.commit_sha }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "Docker image tag output is empty."
            exit 1
          fi

          sed -i -E "s|^([[:space:]]*tag:).*|\1 ${IMAGE_TAG}|" deploy/helm/charts/catalogue/values.yaml
          git add deploy/helm/charts/catalogue/values.yaml

          if git diff --cached --quiet; then
            echo "Helm values already up to date."
            exit 0
          fi

          git commit -m "chore(ci): update catalogue helm image tag to ${IMAGE_TAG} [skip ci]"

          for attempt in 1 2 3; do
            echo "Rebase/push attempt ${attempt}"
            git fetch origin dev
            git rebase origin/dev
            if git push origin HEAD:dev; then
              exit 0
            fi
          done

          echo "Failed to push Helm values update after retries."
          exit 1

