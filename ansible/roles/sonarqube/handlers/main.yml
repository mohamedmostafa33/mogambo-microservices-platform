---
- name: apply sonarqube sysctl
  ansible.builtin.command: sysctl -p /etc/sysctl.d/99-sonarqube.conf
  changed_when: true

- name: restart postgresql
  ansible.builtin.service:
    name: postgresql
    state: restarted

- name: daemon reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart sonarqube
  ansible.builtin.service:
    name: sonarqube
    state: restarted
